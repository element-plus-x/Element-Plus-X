# Example Nginx config for Element-Plus-X docs
# Copy to /etc/nginx/conf.d/element-plus-x.conf and reload nginx.

server {
  listen 80;
  server_name element-plus-x.com;

  include /var/www/element-plus-x/root/redirect.conf;
  if ($root_target = "") {
    set $root_target https://v1.element-plus-x.com;
  }

  return 301 $root_target$request_uri;
}

server {
  listen 80;
  server_name v1.element-plus-x.com;

  root /var/www/element-plus-x/v1/current;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  server_name v2.element-plus-x.com;

  root /var/www/element-plus-x/v2/current;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
